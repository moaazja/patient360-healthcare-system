  uuid: ^4.5.0
  table_calendar: ^3.1.2
  geolocator: ^13.0.0
  image_picker: ^1.1.0
  record: ^6.0.0
  path_provider: ^2.1.4
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.0
