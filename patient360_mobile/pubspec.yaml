name: patient360_mobile
description: Patient 360° mobile app — patient-only companion to the web dashboard.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4
  flutter: '>=3.38.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0
  go_router: ^15.0.0
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  flutter_secure_storage: ^9.2.0
  shared_preferences: ^2.3.0
  google_fonts: ^6.2.0
  lucide_icons_flutter: ^3.0.0
  intl: ^0.20.0
  flutter_dotenv: ^5.2.0
  url_launcher: ^6.3.0
  cached_network_image: ^3.4.0
  qr_flutter: ^4.1.0
  logger: ^2.4.0
  photo_view: ^0.15.0
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1
  permission_handler: ^11.3.1
  uuid: ^4.5.0
  table_calendar: ^3.1.2
  geolocator: ^13.0.0
  image_picker: ^1.1.0
  record: ^6.0.0
  path_provider: ^2.1.4
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.0
  device_info_plus: ^11.0.0
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  riverpod_generator: ^3.0.0
  custom_lint: ^0.8.0
  riverpod_lint: 3.0.3
  flutter_lints: ^5.0.0
  mocktail: ^1.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/translations/