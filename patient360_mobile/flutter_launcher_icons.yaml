# Generates Android + iOS launcher icons from a single 1024×1024 source PNG.
#
# TODO (Anas): drop the brand asset at `assets/images/app_icon.png` before
# running the generator. The icon should be the HeartPulse mark in white on
# a Teal Medica primary (#0D3B3E) background, sized 1024×1024.
#
# Run:
#   flutter pub run flutter_launcher_icons
#
# This regenerates platform icon resources and is reproducible — re-running
# is a no-op when the source PNG is unchanged.

flutter_launcher_icons:
  image_path: assets/images/app_icon.png
  android: ic_launcher
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 23

  # Adaptive icon (Android 8+) — foreground PNG layered over a solid teal
  # background. Foreground should leave 18% padding on each side per
  # Material guidelines so the OS can mask it.
  adaptive_icon_background: "#0D3B3E"
  adaptive_icon_foreground: assets/images/app_icon_foreground.png

  # Web + desktop are not in v1 scope; uncomment when those targets land.
  # web:
  #   generate: true
  # windows:
  #   generate: true
